name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate changelog
        id: changelog
        run: |
          # Extract version from tag
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Grab section from CHANGELOG.md for this version
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > _release_body.md || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: _release_body.md
          generate_release_notes: false
          make_latest: true
